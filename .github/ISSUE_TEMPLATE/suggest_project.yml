name: Suggest a Project
description: Suggest a game translation project to add to the list
title: "[Add] "
labels: ["addition"]
body:
  - type: input
    id: project-url
    attributes:
      label: Project URL
      description: GitHub repo, Paratranz page, or other project link
      placeholder: "https://github.com/user/repo"
    validations:
      required: true

  - type: input
    id: project-name
    attributes:
      label: Project / Game Name
      description: The name to display as the link text
      placeholder: "e.g. Call of Duty 4: Modern Warfare"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Short description (1-2 sentences). Start with uppercase, end with a period."
      placeholder: "e.g. Modern cross-platform installer for the classic 2009 Chinese localization."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Translation Tools
        - FPS / Shooter
        - RPG
        - Adventure / Narrative
        - Card Games
        - Strategy Game Mods
        - Classic / Retro
        - Other
    validations:
      required: true

  - type: input
    id: base-game
    attributes:
      label: Base Game (for mods only)
      description: "If this is a mod, what is the base game? e.g. Hearts of Iron IV"
      placeholder: "Leave blank if not a mod"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The project has a clear README
          required: true
        - label: The project is functional or has a recent release
          required: true
        - label: The project relates to video game translation / localization
          required: true

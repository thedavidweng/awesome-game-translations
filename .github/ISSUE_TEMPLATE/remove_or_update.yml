name: 移除或更新项目 / Remove or Update a Project
description: 报告链接失效、项目废弃或信息过时
title: "[Remove/Update] "
labels: ["removal", "update"]
body:
  - type: dropdown
    id: action
    attributes:
      label: 操作类型 / Action
      options:
        - 移除项目（链接失效/项目废弃）
        - 更新项目信息（描述、链接、分类等）
    validations:
      required: true

  - type: input
    id: project-url
    attributes:
      label: 项目链接 / Project URL
      description: 涉及的项目链接
      placeholder: https://github.com/user/repo
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 原因 / Reason
      description: 为什么要移除或更新？请附上相关证据（如 404 截图、归档状态等）。
    validations:
      required: true
